<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RigLink — PC Build Showcase</title>
  <meta name="description" content="RigLink ile oluşturulmuş özel bilgisayar konfigürasyonu. Bileşen detayları ve fiyat analizi.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* =============================================
       RigLink — Shared System Viewer Dashboard
       Linear / Vercel Aesthetic Design System
       ============================================= */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-main: #0B0E14;
      --bg-surface: #131722;
      --bg-card: rgba(255, 255, 255, 0.025);
      --bg-card-hover: rgba(124, 58, 237, 0.06);

      --brand-purple: #7C3AED;
      --brand-cyan: #06B6D4;
      --brand-gradient: linear-gradient(135deg, #7C3AED 0%, #06B6D4 100%);
      --emerald: #10B981;

      --text-primary: #F3F4F6;
      --text-secondary: #9CA3AF;
      --text-muted: #4B5563;

      --border-subtle: rgba(255, 255, 255, 0.07);
      --border-active: rgba(124, 58, 237, 0.25);
      --font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Subtle background grid & ambient light */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 50% 0%, rgba(124, 58, 237, 0.12) 0%, transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      position: relative;
      z-index: 1;
    }

    /* Header Nav */
    .brand-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 32px;
    }

    .brand-identity {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-box {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(124, 58, 237, 0.12);
      border: 1px solid var(--border-active);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7px;
    }

    .logo-box svg {
      width: 100%;
      height: 100%;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #FFF 0%, #D8B4FE 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-subtitle {
      font-size: 11px;
      font-weight: 700;
      color: var(--brand-cyan);
      letter-spacing: 1px;
    }

    .header-tag {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      padding: 6px 14px;
      border-radius: 100px;
    }

    /* Hero Summary Card */
    .summary-hero {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 28px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      position: relative;
      overflow: hidden;
    }

    .summary-hero::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .stat-group {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .stat-val-highlight {
      font-size: 28px;
      font-weight: 800;
      color: var(--emerald);
      letter-spacing: -0.5px;
    }

    .stat-val-neutral {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    /* Component List */
    .component-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .component-card-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .component-card-row:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-active);
      transform: translateX(4px);
    }

    .component-num {
      font-size: 12px;
      font-weight: 800;
      color: var(--brand-purple);
      background: rgba(124, 58, 237, 0.1);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .component-thumb-box {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
      padding: 4px;
    }

    .component-icon-placeholder {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: rgba(124, 58, 237, 0.08);
      border: 1px solid var(--border-active);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .component-body {
      flex: 1;
      min-width: 0;
    }

    .component-name-text {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .component-card-row:hover .component-name-text {
      color: #D8B4FE;
    }

    .component-category-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.04);
      padding: 2px 8px;
      border-radius: 6px;
    }

    .component-price-val {
      font-size: 15px;
      font-weight: 800;
      color: var(--emerald);
      margin-left: auto;
      flex-shrink: 0;
    }

    .link-arrow {
      color: var(--text-muted);
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .component-card-row:hover .link-arrow {
      color: var(--brand-cyan);
      transform: translateX(3px);
    }

    /* Footer */
    .dashboard-footer {
      text-align: center;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border-subtle);
      color: var(--text-muted);
      font-size: 12px;
    }

    .dashboard-footer a {
      color: var(--brand-purple);
      text-decoration: none;
      font-weight: 600;
    }

    .error-container {
      text-align: center;
      padding: 60px 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
    }

    .error-container h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .error-container p {
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <div class="app-container" id="app">
    <!-- Rendered via JS -->
  </div>

  <script>
    (function () {
      'use strict';

      const CATEGORY_EMOJIS = {
        'İşlemci': '🧠', 'Ekran Kartı': '🎮', 'Anakart': '🔌', 'RAM': '💾',
        'SSD': '💿', 'HDD': '💽', 'Kasa': '🏗️', 'Güç Kaynağı': '⚡',
        'Monitör': '🖥️', 'Klavye': '⌨️', 'Mouse': '🖱️', 'Kulaklık': '🎧',
        'Soğutucu': '❄️', 'İşlemci Soğutucusu': '❄️', 'Kasa Fanı': '🌀',
        'Laptop': '💻'
      };

      const app = document.getElementById('app');

      function decodeData() {
        let hash = window.location.hash.substring(1);
        if (!hash) return null;

        // Custom path önekini temizle (varsa geriye dönük uyumluluk için)
        if (hash.startsWith('al-gerizekali-pc-topladim/')) {
          hash = hash.substring('al-gerizekali-pc-topladim/'.length);
        }

        try {
          const json = decodeURIComponent(escape(atob(hash)));
          const data = JSON.parse(json);
          if (!Array.isArray(data)) return null;
          return data.map(item => ({
            name: item.n || '',
            category: item.c || '',
            price: item.p || '',
            url: item.u || '',
            image: item.i || ''
          }));
        } catch (e) {
          console.error('RigLink Parse Error:', e);
          return null;
        }
      }

      function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function calculateTotal(products) {
        let total = 0;
        products.forEach(p => {
          if (p.price) {
            const num = parseFloat(p.price.replace(/\./g, '').replace(',', '.').replace(/[^\d.]/g, ''));
            if (!isNaN(num)) total += num;
          }
        });
        return total;
      }

      function formatPrice(num) {
        return new Intl.NumberFormat('tr-TR').format(Math.round(num));
      }

      function renderDashboard(products) {
        const total = calculateTotal(products);

        let html = `
          <header class="brand-header">
            <div class="brand-identity">
              <div class="logo-box">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M2 17L12 22L22 17" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M2 12L12 17L22 12" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div>
                <h1 class="brand-title">RigLink</h1>
                <span class="brand-subtitle">SYSTEM SHOWCASE</span>
              </div>
            </div>
            <div class="header-tag">Verified Configuration</div>
          </header>

          <section class="summary-hero">
            <div class="stat-group">
              <span class="stat-label">Toplam Bileşen</span>
              <span class="stat-val-neutral">${products.length} Parça</span>
            </div>
            ${total > 0 ? `
            <div class="stat-group">
              <span class="stat-label">Tahmini Toplam Tutar</span>
              <span class="stat-val-highlight">${formatPrice(total)} TL</span>
            </div>
            ` : ''}
          </section>

          <main class="component-list">
        `;

        products.forEach((product, index) => {
          const emoji = CATEGORY_EMOJIS[product.category] || '📦';
          const thumbHTML = product.image
            ? `<img class="component-thumb-box" src="${escapeHtml(product.image)}" alt="" onerror="this.outerHTML='<div class=\\'component-icon-placeholder\\'>${emoji}</div>'">`
            : `<div class="component-icon-placeholder">${emoji}</div>`;

          html += `
            <a class="component-card-row" href="${escapeHtml(product.url)}" target="_blank" rel="noopener">
              <div class="component-num">${index + 1}</div>
              ${thumbHTML}
              <div class="component-body">
                <div class="component-name-text">${escapeHtml(product.name)}</div>
                <div class="component-category-badge">${emoji} ${escapeHtml(product.category)}</div>
              </div>
              ${product.price ? `<div class="component-price-val">${escapeHtml(product.price)}</div>` : ''}
              <svg class="link-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
              </svg>
            </a>
          `;
        });

        html += `
          </main>

          <footer class="dashboard-footer">
            <p>Bu sistem <a href="https://www.epey.com" target="_blank">epey.com</a> verileri ile <strong>RigLink</strong> tarafından oluşturulmuştur.</p>
          </footer>
        `;

        app.innerHTML = html;
        document.title = `RigLink — PC Build (${products.length} Parça)`;
      }

      function renderError() {
        app.innerHTML = `
          <div class="error-container">
            <h2>Konfigürasyon Yüklenemedi</h2>
            <p>Geçerli bir sistem linki bulunamadı veya bağlantı adresi eksik kopyalanmış olabilir.</p>
          </div>
        `;
      }

      const products = decodeData();
      if (products && products.length > 0) {
        renderDashboard(products);
      } else {
        renderError();
      }

    })();
  </script>
</body>
</html>
