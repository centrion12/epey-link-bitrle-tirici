<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Build — Epey Build Paylaşıcı</title>
  <meta name="description" content="Epey.com'da toplanan bilgisayar build'i — parça listesi ve fiyat karşılaştırması">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* =============================================
       Epey Build Viewer — Self-contained styles
       Premium dark theme, glassmorphism, animations
       ============================================= */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a14;
      --bg-secondary: #12121f;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(108, 92, 231, 0.08);
      --accent: #6C5CE7;
      --accent-light: #a78bfa;
      --accent-glow: rgba(108, 92, 231, 0.3);
      --green: #55efc4;
      --green-dark: #00b894;
      --text-primary: #e8e8f8;
      --text-secondary: #8888aa;
      --text-muted: #555570;
      --border: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(108, 92, 231, 0.2);
      --radius: 18px;
      --radius-sm: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Background effects */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(85, 239, 196, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 40px 20px 30px;
      margin-bottom: 8px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(108, 92, 231, 0.1);
      border: 1px solid var(--border-accent);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-light);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 0%, var(--accent-light) 50%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .header .subtitle {
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 400;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 24px 0 32px;
      flex-wrap: wrap;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: all 0.3s ease;
    }

    .stat-chip:hover {
      border-color: var(--border-accent);
      background: var(--bg-card-hover);
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--green);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .stat-chip.total .stat-value {
      font-size: 22px;
    }

    /* Product Grid */
    .products-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .product-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      color: inherit;
      animation: card-in 0.4s ease backwards;
    }

    .product-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-accent);
      transform: translateX(4px);
      box-shadow: 0 8px 32px rgba(108, 92, 231, 0.1);
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
    }

    .product-index {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(108, 92, 231, 0.15), rgba(168, 85, 247, 0.08));
      border: 1px solid var(--border-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-light);
      flex-shrink: 0;
    }

    .product-thumb {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-sm);
      object-fit: contain;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      flex-shrink: 0;
      padding: 4px;
    }

    .product-thumb-emoji {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, rgba(108, 92, 231, 0.12), rgba(168, 85, 247, 0.06));
      border: 1px solid var(--border-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .product-details {
      flex: 1;
      min-width: 0;
    }

    .product-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .product-card:hover .product-name {
      color: var(--accent-light);
    }

    .product-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .product-category {
      font-size: 11px;
      color: var(--text-secondary);
      background: rgba(108, 92, 231, 0.08);
      padding: 3px 10px;
      border-radius: 8px;
      border: 1px solid rgba(108, 92, 231, 0.12);
      font-weight: 500;
    }

    .product-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
      margin-left: auto;
      flex-shrink: 0;
    }

    .product-link-icon {
      color: var(--text-muted);
      font-size: 18px;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .product-card:hover .product-link-icon {
      color: var(--accent-light);
      transform: translateX(4px);
    }

    /* Footer */
    .viewer-footer {
      text-align: center;
      padding: 40px 20px;
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .viewer-footer a {
      color: var(--accent-light);
      text-decoration: none;
    }

    .viewer-footer a:hover {
      text-decoration: underline;
    }

    .footer-powered {
      margin-top: 8px;
      font-size: 11px;
      opacity: 0.5;
    }

    /* Error State */
    .error-state {
      text-align: center;
      padding: 80px 20px;
    }

    .error-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .error-state h2 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #fff;
    }

    .error-state p {
      color: var(--text-secondary);
      font-size: 15px;
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 12px;
      }
      .product-card {
        padding: 12px 14px;
        gap: 10px;
      }
      .product-thumb,
      .product-thumb-emoji {
        width: 44px;
        height: 44px;
        font-size: 22px;
      }
      .product-name {
        font-size: 13px;
      }
      .product-price {
        font-size: 13px;
      }
      .stats-row {
        gap: 8px;
      }
      .stat-chip {
        padding: 8px 14px;
      }
    }
  </style>
</head>
<body>

  <div class="container" id="app">
    <!-- JS ile doldurulacak -->
  </div>

  <script>
    (function () {
      'use strict';

      const CATEGORY_EMOJIS = {
        'İşlemci': '🧠', 'Ekran Kartı': '🎮', 'Anakart': '🔌', 'RAM': '💾',
        'SSD': '💿', 'HDD': '💽', 'Kasa': '🏗️', 'Güç Kaynağı': '⚡',
        'Monitör': '🖥️', 'Klavye': '⌨️', 'Mouse': '🖱️', 'Kulaklık': '🎧',
        'Soğutucu': '❄️', 'İşlemci Soğutucusu': '❄️', 'Kasa Fanı': '🌀',
        'Laptop': '💻', 'Hoparlör': '🔊', 'Mikrofon': '🎤', 'Webcam': '📷'
      };

      const app = document.getElementById('app');

      function decodeData() {
        const hash = window.location.hash.substring(1);
        if (!hash) return null;

        try {
          const json = decodeURIComponent(escape(atob(hash)));
          const data = JSON.parse(json);
          if (!Array.isArray(data)) return null;
          return data.map(item => ({
            name: item.n || '',
            category: item.c || '',
            price: item.p || '',
            url: item.u || '',
            image: item.i || ''
          }));
        } catch (e) {
          console.error('Build verisi decode edilemedi:', e);
          return null;
        }
      }

      function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function calculateTotal(products) {
        let total = 0;
        products.forEach(p => {
          if (p.price) {
            const num = parseFloat(p.price.replace(/\./g, '').replace(',', '.').replace(/[^\d.]/g, ''));
            if (!isNaN(num)) total += num;
          }
        });
        return total;
      }

      function formatPrice(num) {
        return new Intl.NumberFormat('tr-TR').format(Math.round(num));
      }

      function renderBuild(products) {
        const total = calculateTotal(products);

        let html = `
          <header class="header">
            <div class="header-badge">
              <span>🖥️</span>
              <span>Epey Build Paylaşıcı</span>
            </div>
            <h1>PC Build</h1>
            <p class="subtitle">Bu build ${products.length} parçadan oluşuyor</p>
          </header>

          <div class="stats-row">
            <div class="stat-chip">
              <div>
                <div class="stat-value">${products.length}</div>
                <div class="stat-label">Parça</div>
              </div>
            </div>
            ${total > 0 ? `
            <div class="stat-chip total">
              <div>
                <div class="stat-value">${formatPrice(total)} TL</div>
                <div class="stat-label">Toplam Fiyat</div>
              </div>
            </div>
            ` : ''}
          </div>

          <div class="products-grid">
        `;

        products.forEach((product, index) => {
          const emoji = CATEGORY_EMOJIS[product.category] || '📦';
          const delay = index * 0.06;

          const thumbHTML = product.image
            ? `<img class="product-thumb" src="${escapeHtml(product.image)}" alt="" onerror="this.outerHTML='<div class=\\'product-thumb-emoji\\'>${emoji}</div>'">`
            : `<div class="product-thumb-emoji">${emoji}</div>`;

          html += `
            <a class="product-card" href="${escapeHtml(product.url)}" target="_blank" rel="noopener" style="animation-delay: ${delay}s">
              <div class="product-index">${index + 1}</div>
              ${thumbHTML}
              <div class="product-details">
                <div class="product-name">${escapeHtml(product.name)}</div>
                <div class="product-meta">
                  <span class="product-category">${emoji} ${escapeHtml(product.category)}</span>
                </div>
              </div>
              ${product.price ? `<div class="product-price">${escapeHtml(product.price)}</div>` : ''}
              <span class="product-link-icon">→</span>
            </a>
          `;
        });

        html += `
          </div>

          <footer class="viewer-footer">
            <p>Bu build <a href="https://www.epey.com" target="_blank">epey.com</a> üzerinden oluşturuldu</p>
            <p class="footer-powered">Epey Build Paylaşıcı Chrome Extension ile 💜</p>
          </footer>
        `;

        app.innerHTML = html;

        // Title güncelle
        document.title = `PC Build (${products.length} parça) — Epey Build Paylaşıcı`;
      }

      function renderError() {
        app.innerHTML = `
          <div class="error-state">
            <div class="error-icon">🔍</div>
            <h2>Build bulunamadı</h2>
            <p>
              Bu link geçerli bir build verisi içermiyor. 
              Link doğru kopyalanmamış olabilir.
            </p>
          </div>
          <footer class="viewer-footer">
            <p class="footer-powered">Epey Build Paylaşıcı Chrome Extension 💜</p>
          </footer>
        `;
      }

      // Ana akış
      const products = decodeData();
      if (products && products.length > 0) {
        renderBuild(products);
      } else {
        renderError();
      }

    })();
  </script>
</body>
</html>
